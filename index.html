<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESPAIR DASHBOARD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/dashboard/layout.css">
    <link rel="stylesheet" href="css/dashboard/components.css">
    <link rel="icon" type="image/png" id="favicon" href="images/favicon_yellow.png">
</head>

<body>
    <div class="scanlines"></div>

    <div class="container">
        <header style="margin-bottom: 1.2rem;">
            <button id="global-symbol" onclick="toggleGlobalSymbol()">BTCUSDT</button>
        </header>

        <div class="alert-grid">
            <!-- Price Alert -->
            <div class="alert-card" id="price-card">
                <div class="card-header">
                    <h2>PRICE</h2>
                    <div class="status-indicator inactive">
                        <div class="dot" id="price-dot"></div>
                        <span id="price-status">INACTIVE</span>
                    </div>
                </div>
                <div class="card-content">
                    <div class="tf-selector" id="price-tf-selector">
                        <button type="button" class="tf-current-btn" id="price-tf-trigger"
                            onclick="toggleTFMenu('price')">5m</button>
                        <div class="tf-dropdown-menu" id="price-tf-menu" data-value="5m">
                            <div class="tf-grid">
                                <button type="button" class="tf-btn" onclick="setTF('price', '1m')">1m</button>
                                <button type="button" class="tf-btn active" onclick="setTF('price', '5m')">5m</button>
                                <button type="button" class="tf-btn" onclick="setTF('price', '15m')">15m</button>
                                <button type="button" class="tf-btn" onclick="setTF('price', '1h')">1H</button>
                            </div>
                        </div>
                    </div>
                    <div class="input-row">
                        <label>Target 1</label>
                        <input type="text" id="price-target-1" placeholder="High">
                    </div>
                    <div class="input-row">
                        <label>Target 2</label>
                        <input type="text" id="price-target-2" placeholder="Mid">
                    </div>
                    <div class="input-row">
                        <label>Target 3</label>
                        <input type="text" id="price-target-3" placeholder="Low">
                    </div>
                </div>
                <div class="action-group">
                    <button class="toggle-btn" onclick="toggleAlert('price')">START</button>
                </div>
            </div>

            <!-- EMA Alert (Combined Touch & Close) -->
            <div class="alert-card" id="ema-alert-card">
                <div class="card-header">
                    <h2>EMA</h2>
                    <div class="status-indicator inactive">
                        <div class="dot" id="ema-alert-dot"></div>
                        <span id="ema-alert-status">INACTIVE</span>
                    </div>
                </div>
                <div class="card-content">
                    <div class="tf-selector" id="ema-alert-tf-selector">
                        <button type="button" class="tf-current-btn" id="ema-alert-tf-trigger"
                            onclick="toggleTFMenu('ema-alert')">5m</button>
                        <div class="tf-dropdown-menu" id="ema-alert-tf-menu" data-value="5m">
                            <div class="tf-grid">
                                <button type="button" class="tf-btn" onclick="setTF('ema-alert', '1m')">1m</button>
                                <button type="button" class="tf-btn active"
                                    onclick="setTF('ema-alert', '5m')">5m</button>
                                <button type="button" class="tf-btn" onclick="setTF('ema-alert', '15m')">15m</button>
                                <button type="button" class="tf-btn" onclick="setTF('ema-alert', '1h')">1H</button>
                            </div>
                        </div>
                    </div>
                    <div class="input-row">
                        <label>EMA</label>
                        <input type="number" id="ema-alert-level" placeholder="20">
                    </div>
                    <div class="input-row">
                        <label>Mode</label>
                        <button type="button" id="ema-alert-mode" class="condition-toggle" data-state="touch"
                            onclick="toggleEMAAlertMode()">TOUCH</button>
                    </div>
                    <div class="input-row" id="ema-alert-side-row">
                        <label>Side</label>
                        <button type="button" id="ema-alert-condition" class="condition-toggle disabled-mode"
                            data-state="below" onclick="toggleConditionState('ema-alert-condition')">-</button>
                    </div>
                </div>
                <div class="action-group">
                    <button class="toggle-btn" onclick="toggleAlert('ema-alert')">START</button>
                </div>
            </div>

            <!-- EMA Cross -->

            <div class="alert-card" id="ema-cross-card">

                    <h2>EMA TREND</h2>

                        <span id="ema-cross-status">INACTIVE</span>
                    </div>
                </div>
                <div class="card-content">
                    <div class="tf-selector" id="ema-cross-tf-selector">

                        <div class="tf-dropdown-menu" id="ema-cross-tf-menu" data-value="5m">
                            <div class="tf-grid">
                                <button type="button" class="tf-btn" onclick="setTF('ema-cross', '1m')">1m</button>
                                <button type="button" class="tf-btn active"
                                    onclick="setTF('ema-cross', '5m')">5m</button>
                                <button type="button" class="tf-btn" onclick="setTF('ema-cross', '15m')">15m</button>

                            </div>

                    </div>
                    <div class="input-row">
                        <label>Short</label>
                        <input type="number" id="ema-cross-short" placeholder="10">
                    </div>

            <!-- Heikin Ashi -->
            <div class="alert-card" id="heikin-card">
                <div class="card-header">
                    <h2>HEIKIN ASHI</h2>
                    <div class="status-indicator inactive">
                        <div class="dot" id="heikin-dot"></div>
                        <span id="heikin-status">INACTIVE</span>
                    </div>
                </div>
                <div class="card-content">
                    <div class="tf-selector" id="heikin-tf-selector">
                        <button type="button" class="tf-current-btn" id="heikin-tf-trigger"
                            onclick="toggleTFMenu('heikin')">5m</button>
                        <div class="tf-dropdown-menu" id="heikin-tf-menu" data-value="5m">
                            <div class="tf-grid">
                                <button type="button" class="tf-btn" onclick="setTF('heikin', '1m')">1m</button>
                                <button type="button" class="tf-btn" onclick="setTF('heikin', '3m')">3m</button>
                                <button type="button" class="tf-btn active" onclick="setTF('heikin', '5m')">5m</button>
                                <button type="button" class="tf-btn" onclick="setTF('heikin', '15m')">15m</button>
                                <button type="button" class="tf-btn" onclick="setTF('heikin', '1h')">1H</button>
                                <button type="button" class="tf-btn" onclick="setTF('heikin', '2h')">2H</button>
                                <button type="button" class="tf-btn" onclick="setTF('heikin', '4h')">4H</button>
                                <button type="button" class="tf-btn" onclick="setTF('heikin', '6h')">6H</button>
                            </div>
                        </div>
                    </div>
                    <div class="input-row spacer"></div>
                    <div class="input-row">
                        <label>Mode</label>
                        <button type="button" id="heikin-mode" class="condition-toggle" data-state="is"
                            onclick="toggleHeikinMode()">IS</button>
                    </div>
                    <div class="input-row">
                        <label>Color</label>
                        <button type="button" id="heikin-condition" class="condition-toggle red-mode"
                            data-state="perfect-red" onclick="toggleConditionState('heikin-condition')">RED</button>
                    </div>
                </div>
                <div class="action-group">
                    <button class="toggle-btn" onclick="toggleAlert('heikin')">START</button>
                </div>
            </div>

            <!-- RAW CANDLE -->
            <div class="alert-card" id="rawcandle-card">
                <div class="card-header">
                    <h2>RAW CANDLE</h2>
                    <div class="status-indicator inactive">
                        <div class="dot" id="rawcandle-dot"></div>
                        <span id="rawcandle-status">INACTIVE</span>
                    </div>
                </div>
                <div class="card-content">
                    <div class="tf-selector" id="rawcandle-tf-selector">
                        <button type="button" class="tf-current-btn" id="rawcandle-tf-trigger"
                            onclick="toggleTFMenu('rawcandle')">15m</button>
                        <div class="tf-dropdown-menu" id="rawcandle-tf-menu" data-value="15m">
                            <div class="tf-grid">
                                <button type="button" class="tf-btn" onclick="setTF('rawcandle', '5m')">5m</button>
                                <button type="button" class="tf-btn active"
                                    onclick="setTF('rawcandle', '15m')">15m</button>
                                <button type="button" class="tf-btn" onclick="setTF('rawcandle', '1h')">1H</button>
                                <button type="button" class="tf-btn" onclick="setTF('rawcandle', '2h')">2H</button>
                            </div>
                        </div>
                    </div>
                    <div class="input-row spacer"></div>
                    <div class="input-row">
                        <label>Mode</label>
                        <button type="button" id="rawcandle-mode" class="condition-toggle" data-state="turned"
                            onclick="toggleRawCandleMode()">TURNED</button>
                    </div>
                    <div class="input-row">
                        <label>Color</label>
                        <button type="button" id="rawcandle-condition" class="condition-toggle red-mode"
                            data-state="red" onclick="toggleConditionState('rawcandle-condition')">RED</button>
                    </div>
                </div>
                <div class="action-group">
                    <button class="toggle-btn" onclick="toggleAlert('rawcandle')">START</button>
                </div>
            </div>

            <!-- Bearish SFP -->
            <div class="alert-card" id="sfp-short-card">
                <div class="card-header">
                    <h2>BEARISH SFP</h2>
                    <div class="status-indicator inactive">
                        <div class="dot" id="sfp-short-dot"></div>
                        <span id="sfp-short-status">INACTIVE</span>
                    </div>
                </div>
                <div class="card-content">
                    <!-- TF 1 -->
                    <div class="tf-selector" id="sfp-short-1-tf-selector">
                        <button type="button" class="tf-current-btn" id="sfp-short-1-tf-trigger"
                            onclick="toggleTFMenu('sfp-short-1')">15m</button>
                        <div class="tf-dropdown-menu" id="sfp-short-1-tf-menu" data-value="15m">
                            <div class="tf-grid">
                                <button type="button" class="tf-btn" onclick="setTF('sfp-short-1', '5m')">5m</button>
                                <button type="button" class="tf-btn active"
                                    onclick="setTF('sfp-short-1', '15m')">15m</button>
                                <button type="button" class="tf-btn" onclick="setTF('sfp-short-1', '30m')">30m</button>
                                <button type="button" class="tf-btn" onclick="setTF('sfp-short-1', '1d')">1D</button>
                                <button type="button" class="tf-btn" onclick="setTF('sfp-short-1', '1h')">1H</button>
                                <button type="button" class="tf-btn" onclick="setTF('sfp-short-1', '2h')">2H</button>
                                <button type="button" class="tf-btn" onclick="setTF('sfp-short-1', '4h')">4H</button>
                                <button type="button" class="tf-btn" onclick="setTF('sfp-short-1', '6h')">6H</button>
                            </div>
                        </div>
                    </div>
                    <!-- TF 2 -->
                    <div class="tf-selector" id="sfp-short-3-tf-selector">
                        <button type="button" class="tf-current-btn" id="sfp-short-3-tf-trigger"
                            onclick="toggleTFMenu('sfp-short-3')">2h</button>
                        <div class="tf-dropdown-menu" id="sfp-short-3-tf-menu" data-value="2h">
                            <div class="tf-grid">
                                <button type="button" class="tf-btn" onclick="setTF('sfp-short-3', '5m')">5m</button>
                                <button type="button" class="tf-btn" onclick="setTF('sfp-short-3', '15m')">15m</button>
                                <button type="button" class="tf-btn" onclick="setTF('sfp-short-3', '30m')">30m</button>
                                <button type="button" class="tf-btn" onclick="setTF('sfp-short-3', '1d')">1D</button>
                                <button type="button" class="tf-btn" onclick="setTF('sfp-short-3', '1h')">1H</button>
                                <button type="button" class="tf-btn active"
                                    onclick="setTF('sfp-short-3', '2h')">2H</button>
                                <button type="button" class="tf-btn" onclick="setTF('sfp-short-3', '4h')">4H</button>
                                <button type="button" class="tf-btn" onclick="setTF('sfp-short-3', '6h')">6H</button>
                            </div>
                        </div>
                    </div>
                    <div class="input-row spacer"></div>
                    <div class="input-row spacer"></div>
                </div>
                <div class="action-group">
                    <button class="toggle-btn" onclick="toggleAlert('sfp-short')">START</button>
                </div>
            </div>
        </div>



        <div id="footer-controls"
            style="display: flex; align-items: center; justify-content: center; gap: 2.5rem; margin-top: 1.5rem; margin-bottom: 1.5rem;">
            <a href="trend.html" target="_blank" class="despair-link" style="margin: 0;">TREND BEEP</a>
        </div>
    </div>

    <!-- Modular Dashboard Scripts -->
    <script src="js/env.js"></script>
    <script src="js/dashboard/api.js"></script>
    <script src="js/dashboard/indicators.js"></script>
    <script src="js/dashboard/speech.js"></script>
    <script src="js/dashboard/ui.js"></script>
    <script src="js/dashboard/engine.js"></script>
    <script src="js/dashboard/main.js"></script>
    <script src="js/dashboard/ha_coloring.js"></script>
</body>

</html>
