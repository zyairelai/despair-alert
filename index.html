<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESPAIR ALERT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="web/style.css">
</head>

<body>
    <div class="scanlines"></div>

    <div class="container">
        <div class="terminal-card">
            <header>
                <h1 id="symbolLabel">BTCUSDT</h1>
            </header>

            <div class="status-display">
                <div id="htfRow" class="status-row">
                    <span class="label">15m :</span> <span id="htfStatus">LOADING...</span>
                </div>
                <div id="ltfRow" class="status-row">
                    <span class="label">5m :</span> <span id="ltfStatus">LOADING...</span>
                </div>
                <div id="trendDisplay" class="overall-trend trend-neutral">INITIALIZING...</div>
            </div>

            <div class="timer-display">
                <div id="countdown">00:00</div>
                <div class="controls">
                    <button id="startBtn" onclick="start()">START MONITORING</button>
                </div>
            </div>
        </div>
    </div>

    <script src="web/script.js"></script>
</body>

</html>
